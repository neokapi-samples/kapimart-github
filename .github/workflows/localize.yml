name: Localize

# The localization pipeline, dogfooding the kapi GitHub tooling
# (neokapi/setup-kapi + neokapi/kapi-action). Two ways in:
#
#   * pull_request → the source gate: check the English copy against the brand
#     voice before it is ever translated ("keep source on brand"), and lint the
#     React source for i18n anti-patterns. Keyless.
#   * manual (ai) → translate into the real languages with an AI provider and
#     open a PR you review before merging. Needs an provider key.
#
# Every run first re-extracts the catalogs from the React source with
# neokapi-i18n, so the pipeline always reflects the current UI copy.
#
# Pseudo-localization is no longer a CI step or a static `qps` catalog: it is a
# dev-only runtime toggle in the app (setPseudoMode), surfaced as "Pseudo
# English" in the language picker. Nothing to extract, translate, or deploy.

on:
  pull_request:
    paths: ["src/**", "i18n/**"]
  workflow_dispatch:

env:
  KAPI_VERSION: "1.2.0-rc15" # `kapi up` / `check` / `status --ship`

jobs:
  # PR gate: is the English source on brand, and free of i18n anti-patterns?
  gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: npm ci
      # Lint the React source with oxlint, including the neokapi-i18n rules
      # (@neokapi/i18n-react-lint) that catch un-extractable strings.
      - run: npm run lint
      - run: npm run i18n:extract
      - uses: neokapi/setup-kapi@v1
        with: { version: "1.2.0-rc15", plugins: "" }
      - uses: neokapi/kapi-action@v1
        with:
          command: check
          args: "i18n/src/App.klf --profile-file i18n/brand-voice.yaml"
          commit: "false"
          pr-comment: "true"

  # Real languages: translate with an AI provider, open a PR to review.
  ai:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: npm ci
      - run: npm run i18n:extract
      - uses: neokapi/setup-kapi@v1
        with: { version: "1.2.0-rc15", plugins: "" }
      - uses: neokapi/kapi-action@v1
        env:
          # kapi reads the provider key from the conventional env var and the
          # default provider from KAPI_AI_PROVIDER (KAPI_-prefixed app config).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KAPI_AI_PROVIDER: gemini
        with:
          command: up
          project: "kapi.yaml"
          create-pull-request: "true"
          pr-title: "chore: update translations"
          pr-labels: "localization"
          branch-prefix: "kapi/translate"
