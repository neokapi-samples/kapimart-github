# kapi project recipe for KapiMart.
#
# Content = the localization catalogs neokapi-i18n extracts from the React
# source (i18n/src/**/*.klf). kapi translates them into a nested i18n/<lang>/
# tree; `neokapi-i18n compile` then turns those into the runtime catalogs the
# app loads (public/translations/<lang>.json).
#
# The source of truth is the React source; the catalogs are generated. Run
# `npm run i18n:extract` after changing UI copy, then let the pipeline
# translate.
version: v1
name: kapimart
defaults:
  source_language: en
  target_languages: [fr, de, ja, nb]
  brand_voice:
    profile_file: i18n/brand-voice.yaml
  termbase_source: i18n/termbase.klftb
content:
  - path: i18n/src/**/*.klf
    target: i18n/{lang}/{path}.klf
# Two-gate ship model. The default `ship` gate decides whether a locale is
# offered in the picker at all; the named `verified` gate marks a locale as
# human-reviewed (no "AI" badge). Flagship locales (fr, de) are held to the
# verified gate, so they show as verified once reviewed and as AI otherwise —
# the picker demonstrates both states side by side.
gates:
  verified:
    reviewed: 25
verified_gates:
  - when:
      locales: [fr, de]
    gate: verified
